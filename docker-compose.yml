services:
  localterra:
    # Pinned digest for reproducible QA; tag reference: ghcr.io/plasticdigits/localterra-cl8y:latest
    image: ghcr.io/plasticdigits/localterra-cl8y@sha256:9a58488b7fd65fd6a87e43384c0ee3023178378402505bbd8bcd114ce0c9938e
    platform: linux/amd64
    ports:
      - "127.0.0.1:26657:26657"
      - "127.0.0.1:1317:1317"
      - "127.0.0.1:9090:9090"
      - "127.0.0.1:9091:9091"
    volumes:
      - localterra-data:/home/terra/.terra
      - ./docker/init-chain.sh:/usr/local/bin/init-chain.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:26657/status"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    # Pinned digest; bump via: docker pull postgres:16-alpine && docker inspect ...
    image: postgres@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: dex_indexer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  localterra-data:
  postgres-data:
