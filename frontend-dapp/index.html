<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CL8Y DEX - Decentralized exchange on Terra Classic" />
    <meta property="og:title" content="CL8Y DEX" />
    <meta property="og:description" content="CW20 token exchange on Terra Classic" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CL8Y DEX" />
    <meta name="twitter:description" content="CW20 token exchange on Terra Classic" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss: http://localhost:* http://127.0.0.1:*; img-src 'self' data: https:; font-src 'self';" />
    <title>CL8Y DEX</title>
    <script>
      (function() {
        var s = localStorage.getItem('cl8y-dex-theme');
        if (s !== 'dark' && s !== 'light') {
          s = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', s || 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
