name: CI

on:
  push:
    branches: [main]
    paths:
      - "smartcontracts/**"
      - "frontend-dapp/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "smartcontracts/**"
      - "frontend-dapp/**"
      - ".github/workflows/**"

jobs:
  contracts-terra:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcontracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: smartcontracts

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Build WASM (pair)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-pair

      - name: Build WASM (factory)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-factory

      - name: Build WASM (router)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-router

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-dapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run
