name: CI

on:
  push:
    branches: [main]
    paths:
      - "smartcontracts/**"
      - "frontend-dapp/**"
      - "indexer/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "smartcontracts/**"
      - "frontend-dapp/**"
      - "indexer/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  contracts-terra:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcontracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: smartcontracts

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Contract tests (with LCOV coverage)
        run: cargo llvm-cov test --workspace --lcov --output-path lcov.info

      - name: Upload smart contracts LCOV
        uses: actions/upload-artifact@v4
        with:
          name: smartcontracts-lcov
          path: smartcontracts/lcov.info

      - name: Build WASM (pair)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-pair

      - name: Build WASM (factory)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-factory

      - name: Build WASM (router)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-router

      - name: Build WASM (fee-discount)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-fee-discount

      - name: Build WASM (burn-hook)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-burn-hook

      - name: Build WASM (tax-hook)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-tax-hook

      - name: Build WASM (lp-burn-hook)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-lp-burn-hook

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-dapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

  indexer:
    name: Indexer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cl8y_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cl8y_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexer

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend-dapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start LocalTerra
        run: |
          docker compose -f docker-compose.yml up -d localterra
          sleep 15
        working-directory: .

      - name: Deploy contracts locally
        run: |
          bash scripts/deploy-dex-local.sh
        working-directory: .

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          VITE_NETWORK: local
