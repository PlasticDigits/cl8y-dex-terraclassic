name: CI

on:
  push:
    branches: [main]
    paths:
      - "smartcontracts/**"
      - "frontend-dapp/**"
      - "indexer/**"
      - "packages/localnet-trading-swarm/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "smartcontracts/**"
      - "frontend-dapp/**"
      - "indexer/**"
      - "packages/localnet-trading-swarm/**"
      - "docker-compose.yml"
      - ".github/workflows/**"

jobs:
  contracts-terra:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcontracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: smartcontracts

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Contract tests (with LCOV coverage)
        run: cargo llvm-cov test --workspace --lcov --output-path lcov.info

      - name: Upload smart contracts LCOV
        uses: actions/upload-artifact@v4
        with:
          name: smartcontracts-lcov
          path: smartcontracts/lcov.info

      - name: Build WASM (pair)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-pair

      - name: Build WASM (factory)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-factory

      - name: Build WASM (router)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-router

      - name: Build WASM (fee-discount)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-fee-discount

      - name: Build WASM (burn-hook)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-burn-hook

      - name: Build WASM (tax-hook)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-tax-hook

      - name: Build WASM (lp-burn-hook)
        run: cargo build --release --target wasm32-unknown-unknown -p cl8y-dex-lp-burn-hook

  localnet-trading-swarm:
    name: Localnet trading swarm (package)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/localnet-trading-swarm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json

      - name: Unit tests
        run: npm run test:run

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-dapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

  frontend-charts-integration:
    name: Frontend charts integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cl8y_charts_int
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexer

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version 0.8.6 --no-default-features --features rustls,postgres --locked

      - name: Create database and run migrations
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE cl8y_charts_int;" || true
          cd indexer && sqlx migrate run

      - name: Seed charts integration fixtures
        run: psql "$DATABASE_URL" -f indexer/scripts/seed-charts-integration.sql

      - name: Build indexer (release)
        run: cargo build --release
        working-directory: indexer

      - name: Start indexer HTTP API
        working-directory: indexer
        run: |
          export DATABASE_URL=postgres://postgres:postgres@localhost:5432/cl8y_charts_int
          export FACTORY_ADDRESS=terra1jv65es0zkfhad9khmjyqjfue58jl390jsattf
          export CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
          export LCD_URLS=https://terra-classic-lcd.publicnode.com
          export POLL_INTERVAL_MS=3600000
          export API_PORT=3001
          export API_BIND=127.0.0.1
          nohup ./target/release/cl8y-dex-indexer > /tmp/indexer-charts.log 2>&1 &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3001/api/v1/overview > /dev/null; then
              echo "indexer ready"
              exit 0
            fi
            sleep 1
          done
          echo "--- indexer log ---"
          cat /tmp/indexer-charts.log
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-dapp

      - name: Vitest charts integration
        run: npm run test:integration
        working-directory: frontend-dapp
        env:
          VITE_INDEXER_URL: http://127.0.0.1:3001

  indexer:
    name: Indexer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cl8y_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cl8y_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/cl8y_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexer

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend-dapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start LocalTerra
        run: |
          docker compose -f docker-compose.yml up -d localterra
          sleep 15
        working-directory: .

      - name: Deploy contracts locally
        run: |
          bash scripts/deploy-dex-local.sh
        working-directory: .

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          VITE_NETWORK: local
